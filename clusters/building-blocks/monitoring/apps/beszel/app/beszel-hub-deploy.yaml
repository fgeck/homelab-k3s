---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beszel-hub
  namespace: monitoring
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/name: beszel-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: beszel-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beszel-hub
    spec:
      containers:
        - name: beszel-hub
          image: henrygd/beszel:0.18.5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /beszel_data
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: beszel-hub-pvc
