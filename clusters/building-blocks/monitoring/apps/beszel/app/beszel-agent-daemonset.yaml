---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beszel-agent
  namespace: monitoring
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/name: beszel-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: beszel-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beszel-agent
    spec:
      # hostNetwork is required for accurate network stats, temperature sensors,
      # and S.M.A.R.T. data. The agent listens on the node's physical IP:45876.
      hostNetwork: true
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      containers:
        - name: beszel-agent
          image: henrygd/beszel-agent:0.18.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 45876
              hostPort: 45876
              protocol: TCP
          env:
            - name: LISTEN
              value: "45876"
            - name: KEY
              valueFrom:
                secretKeyRef:
                  name: beszel-agent-secret
                  key: key
          volumeMounts:
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                # Required for reading host metrics (network stats, disk I/O)
                - SYS_PTRACE
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 100%
