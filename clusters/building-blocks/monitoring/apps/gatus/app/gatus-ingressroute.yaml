---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/traefik.io/ingressroute_v1alpha1.json
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gatus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: gatus
spec:
  entryPoints:
    - websecure
    - web
  routes:
    # External endpoint API — no tinyauth (h-cloud pushes heartbeats here)
    - kind: Rule
      match: Host(`status.home.${DOMAIN_NAME}`) && PathPrefix(`/api/v1/endpoints/`)
      priority: 20
      middlewares:
        - name: local-ipallowlist
          namespace: edge
      services:
        - kind: Service
          name: gatus
          namespace: monitoring
          passHostHeader: true
          port: 8080
          scheme: http
    # Everything else — behind tinyauth
    - kind: Rule
      match: Host(`status.home.${DOMAIN_NAME}`)
      priority: 10
      middlewares:
        - name: local-ipallowlist
          namespace: edge
        - name: tinyauth
          namespace: security
      services:
        - kind: Service
          name: gatus
          namespace: monitoring
          passHostHeader: true
          port: 8080
          scheme: http
