---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: gatus
data:
  config.yaml: |-
    storage:
      type: sqlite
      path: /data/gatus.db

    ui:
      title: Homelab Status
      default-sort-by: group
      description: Service Health Dashboard

    alerting:
      pushover:
        application-token: $${PUSHOVER_STATUS_TOKEN}
        user-key: $${PUSHOVER_USER_KEY}

    default-external-endpoint: &defaults-external
      group: 1-External
      interval: 15s
      conditions:
        - "[STATUS] == 200"
        - "[CERTIFICATE_EXPIRATION] > 14d"
      alerts:
        - type: pushover

    default-home-endpoint: &defaults-home
      group: 2-Home
      interval: 15s
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: pushover

    endpoints:
      # ============================================
      # External Services (*.DOMAIN_NAME via Cloudflare)
      # ============================================
      - name: Domain Reachability
        <<: *defaults-external
        url: https://id.${DOMAIN_NAME}
      - name: Immich (photos)
        <<: *defaults-external
        url: https://photos.${DOMAIN_NAME}
      - name: Paperless-NGX (docs)
        <<: *defaults-external
        url: https://docs.${DOMAIN_NAME}
      - name: Karakeep (bookmarks)
        <<: *defaults-external
        url: https://bookmarks.${DOMAIN_NAME}
      - name: Vaultwarden (vw)
        <<: *defaults-external
        url: https://vw.${DOMAIN_NAME}
      - name: Pocket ID (id)
        <<: *defaults-external
        url: https://id.${DOMAIN_NAME}
      - name: Calibre-Web (books)
        <<: *defaults-external
        url: https://books.${DOMAIN_NAME}
      - name: Donetick (todo)
        <<: *defaults-external
        url: https://todo.${DOMAIN_NAME}
      - name: Obsidian Sync (obsidian)
        group: 1-External
        url: https://obsidian.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] < 500"
        alerts:
          - type: pushover

      # ============================================
      # Home Services (*.home.DOMAIN_NAME - internal only)
      # ============================================
      - name: Homepage (my.home)
        <<: *defaults-home
        url: https://my.home.${DOMAIN_NAME}
      - name: Immich (photos.home)
        <<: *defaults-home
        url: https://photos.home.${DOMAIN_NAME}
        interval: 15s
      - name: Jellyfin (watch.home)
        <<: *defaults-home
        url: https://watch.home.${DOMAIN_NAME}
      - name: Jellyseerr (browse.home)
        <<: *defaults-home
        url: https://browse.home.${DOMAIN_NAME}
      - name: Radarr (radarr.home)
        <<: *defaults-home
        url: https://radarr.home.${DOMAIN_NAME}
      - name: Sonarr (sonarr.home)
        <<: *defaults-home
        url: https://sonarr.home.${DOMAIN_NAME}
      - name: Sabnzbd (dl.home)
        <<: *defaults-home
        url: https://dl.home.${DOMAIN_NAME}
      - name: Vaultwarden (vw.home)
        <<: *defaults-home
        url: https://vw.home.${DOMAIN_NAME}
      - name: Spoolman (spools.home)
        <<: *defaults-home
        url: https://spools.home.${DOMAIN_NAME}
      - name: Better Bahn (bahn.home)
        group: 2-Home
        interval: 15s
        url: https://bahn.home.${DOMAIN_NAME}
        conditions:
          - "[STATUS] == 401"
        alerts:
          - type: pushover
      - name: Gatus (status.home)
        <<: *defaults-home
        url: https://status.home.${DOMAIN_NAME}
      - name: Flux UI (flux.home)
        <<: *defaults-home
        url: https://flux.home.${DOMAIN_NAME}
      - name: Beszel (infra.home)
        <<: *defaults-home
        url: https://infra.home.${DOMAIN_NAME}

    # ============================================
    # H-Cloud (heartbeat/external endpoints)
    # ============================================
    external-endpoints:
      - name: h-cloud-cluster
        group: 3-H-Cloud
        token: $${H_CLOUD_PUSHOVER_CLUSTER_ENDPOINT_TOKEN}
        heartbeat:
          interval: 15m
        alerts:
          - type: pushover
            send-on-resolved: true
            failure-threshold: 10
            success-threshold: 1
