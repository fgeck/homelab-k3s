---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: gatus
data:
  config.yaml: |
    storage:
      type: sqlite
      path: /data/gatus.db

    ui:
      title: Homelab Status
      description: Service Health Dashboard

    alerting:
      telegram:
        token: $${TELEGRAM_TOKEN}
        id: $${TELEGRAM_CHAT_ID}

    endpoints:
      # ============================================
      # External Services (*.DOMAIN_NAME via Cloudflare)
      # ============================================
      - name: Domain Reachability
        group: 1-External
        url: https://id.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 14d"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Immich (photos)
        group: 1-External
        url: https://photos.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 14d"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Paperless-NGX (docs)
        group: 1-External
        url: https://docs.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 14d"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Karakeep (bookmarks)
        group: 1-External
        url: https://bookmarks.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 14d"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Vaultwarden (vw)
        group: 1-External
        url: https://vw.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 14d"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Pocket ID (id)
        group: 1-External
        url: https://id.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 14d"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Calibre-Web (books)
        group: 1-External
        url: https://books.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 14d"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Obsidian Sync (obsidian)
        group: 1-External
        url: https://obsidian.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] < 500"
          - "[CERTIFICATE_EXPIRATION] > 14d"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      # ============================================
      # Home Services (*.home.DOMAIN_NAME - internal only)
      # ============================================
      - name: Homepage (my.home)
        group: 2-Home
        url: https://my.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Immich (photos.home)
        group: 2-Home
        url: https://photos.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Jellyfin (watch.home)
        group: 2-Home
        url: https://watch.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Jellyseerr (browse.home)
        group: 2-Home
        url: https://browse.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Radarr (radarr.home)
        group: 2-Home
        url: https://radarr.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Sonarr (sonarr.home)
        group: 2-Home
        url: https://sonarr.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Sabnzbd (dl.home)
        group: 2-Home
        url: https://dl.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Vaultwarden (vw.home)
        group: 2-Home
        url: https://vw.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Spoolman (spools.home)
        group: 2-Home
        url: https://spools.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Better Bahn (bahn.home)
        group: 2-Home
        url: https://bahn.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Gatus (status.home)
        group: 2-Home
        url: https://status.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Flux UI (flux.home)
        group: 2-Home
        url: https://flux.home.${DOMAIN_NAME}
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      # ============================================
      # In-Cluster Services (direct cluster access)
      # ============================================
      - name: Immich Server
        group: 3-Cluster
        url: http://immich.media.svc.cluster.local:2283/api/server/ping
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Jellyfin
        group: 3-Cluster
        url: http://jellyfin.media.svc.cluster.local:8096/health
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Jellyseerr
        group: 3-Cluster
        url: http://jellyseerr.media.svc.cluster.local:5055
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Radarr
        group: 3-Cluster
        url: http://radarr.media.svc.cluster.local:80/ping
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Sonarr
        group: 3-Cluster
        url: http://sonarr.media.svc.cluster.local:80/ping
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Sabnzbd
        group: 3-Cluster
        url: http://sabnzbd.media.svc.cluster.local:80
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Paperless-NGX
        group: 3-Cluster
        url: http://paperless.default.svc.cluster.local:80
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Karakeep
        group: 3-Cluster
        url: http://karakeep.default.svc.cluster.local:80
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Vaultwarden
        group: 3-Cluster
        url: http://vaultwarden.security.svc.cluster.local:80
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Pocket ID
        group: 3-Cluster
        url: http://pocket-id.security.svc.cluster.local:1411
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Homepage
        group: 3-Cluster
        url: http://homepage.default.svc.cluster.local:3000
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Meilisearch
        group: 3-Cluster
        url: http://meilisearch.default.svc.cluster.local:7700/health
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Redis
        group: 3-Cluster
        url: tcp://redis-master.default.svc.cluster.local:6379
        interval: 15s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: PostgreSQL (Default)
        group: 3-Cluster
        url: tcp://postgresql-vecto-cluster-rw.default.svc.cluster.local:5432
        interval: 15s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: PostgreSQL (Security)
        group: 3-Cluster
        url: tcp://security-postgres-cnpg-cluster-rw.security.svc.cluster.local:5432
        interval: 15s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Traefik
        group: 3-Cluster
        url: tcp://traefik.edge.svc.cluster.local:80
        interval: 15s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: CouchDB (Obsidian)
        group: 3-Cluster
        url: http://couchdb.default.svc.cluster.local:80/_up
        interval: 15s
        conditions:
          - "[STATUS] < 500"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Calibre-Web
        group: 3-Cluster
        url: http://calibre-wa.media.svc.cluster.local:80
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Crowdsec LAPI
        group: 3-Cluster
        url: http://crowdsec-lapi.security.svc.cluster.local:8080/health
        interval: 15s
        conditions:
          - "[STATUS] == 200"
          - "[BODY].status == up"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: Crowdsec Agent
        group: 3-Cluster
        url: http://crowdsec-agent-service.security.svc.cluster.local:6060/metrics
        interval: 15s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: CoreDNS Health
        group: 3-Cluster
        url: tcp://kube-dns.kube-system.svc.cluster.local:53
        interval: 15s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: DNS Resolution (internal)
        group: 3-Cluster
        url: "kube-dns.kube-system.svc.cluster.local"
        interval: 120s
        dns:
          query-name: "kubernetes.default.svc.cluster.local"
          query-type: "A"
        conditions:
          - "[DNS_RCODE] == NOERROR"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true

      - name: DNS Resolution (external)
        group: 3-Cluster
        url: "kube-dns.kube-system.svc.cluster.local"
        interval: 120s
        dns:
          query-name: "google.com"
          query-type: "A"
        conditions:
          - "[DNS_RCODE] == NOERROR"
        alerts:
          - type: telegram
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true
