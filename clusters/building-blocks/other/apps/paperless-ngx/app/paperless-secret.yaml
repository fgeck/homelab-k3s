apiVersion: v1
kind: Secret
metadata:
  name: paperless
  namespace: default
type: Opaque
stringData:
  PAPERLESS_SECRET_KEY: ${quote}${PAPERLESS_SECRET_KEY}${quote}
  PAPERLESS_ADMIN_USER: ${quote}${PAPERLESS_ADMIN_USER}${quote}
  PAPERLESS_ADMIN_PASSWORD: ${quote}${PAPERLESS_ADMIN_PASSWORD}${quote}
  # Redis connection with dedicated paperless user
  # Format: redis://username:password@host:port
  PAPERLESS_REDIS: ${quote}redis://${PAPERLESS_REDIS_USER}:${PAPERLESS_REDIS_PASSWORD}@${REDIS_HOST}${quote}
  PAPERLESS_EMAIL_HOST: ${RESEND_SMTP_HOST}
  PAPERLESS_EMAIL_PORT: ${quote}${RESEND_SMTP_PORT}${quote}
  PAPERLESS_EMAIL_HOST_USER: ${RESEND_SMTP_USER}
  PAPERLESS_EMAIL_FROM: "homelab@${DOMAIN_NAME}"
  PAPERLESS_EMAIL_HOST_PASSWORD: ${quote}${RESEND_API_KEY}${quote}
  PAPERLESS_EMAIL_USE_TLS: "true"
  PAPERLESS_EMAIL_USE_SSL: "false"
  PAPERLESS_SOCIALACCOUNT_PROVIDERS: '{"openid_connect": {"SCOPE": ["openid", "profile", "email"], "OAUTH_PKCE_ENABLED": true, "APPS": [{"provider_id": "pocket-id", "name": "Pocket ID", "client_id": "${PAPERLESS_POCKETID_CLIENT_ID}", "secret": "${PAPERLESS_POCKETID_CLIENT_SECRET}", "settings": {"server_url": "https://id.${DOMAIN_NAME}"}}]}}'
  PAPERLESS_SOCIAL_AUTO_SIGNUP: "true"
  PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: "true"
