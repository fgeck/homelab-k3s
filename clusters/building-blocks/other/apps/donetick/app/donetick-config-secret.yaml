---
apiVersion: v1
kind: Secret
metadata:
  name: donetick-config-secret
  namespace: default
  labels:
    app.kubernetes.io/name: donetick
type: Opaque
stringData:
  selfhosted.yaml: |
    name: "selfhosted"
    is_done_tick_dot_com: false
    database:
      type: "sqlite"
      migration: true
    jwt:
      session_time: 168h
      max_refresh: 1440h
    server:
      port: 2021
      read_timeout: 10s
      write_timeout: 10s
      rate_period: 60s
      rate_limit: 300
      cors_allow_origins:
        - "capacitor://localhost"
        - "http://localhost"
        - "https://localhost"
        - "https://todo.${DOMAIN_NAME}"
      serve_frontend: true
      serve_swagger: false
      public_host: "https://todo.${DOMAIN_NAME}"
    logging:
      level: "info"
      encoding: "json"
      development: false
    scheduler_jobs:
      due_job: 30m
      overdue_job: 3h
      pre_due_job: 3h
    realtime:
      enabled: true
      sse_enabled: true
      heartbeat_interval: 60s
      connection_timeout: 120s
      max_connections: 1000
      max_connections_per_user: 5
      event_queue_size: 2048
      cleanup_interval: 2m
      stale_threshold: 5m
      enable_compression: true
    oauth2:
      client_id: ${DONETICK_POCKETID_CLIENT_ID}
      client_secret: ${DONETICK_POCKETID_CLIENT_SECRET}
      auth_url: https://id.${DOMAIN_NAME}/authorize
      token_url: https://id.${DOMAIN_NAME}/api/oidc/token
      user_info_url: https://id.${DOMAIN_NAME}/api/oidc/userinfo
      redirect_url: "https://todo.${DOMAIN_NAME}/api/v1/auth/oauth2/callback"
      name: "PocketID"
