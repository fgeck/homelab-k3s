---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: donetick
  namespace: default
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/name: donetick
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: donetick
  template:
    metadata:
      labels:
        app.kubernetes.io/name: donetick
    spec:
      containers:
        - name: donetick
          image: donetick/donetick:v0.1.75
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2021
              name: http
              protocol: TCP
          env:
            - name: DT_ENV
              value: "selfhosted"
            - name: DT_SQLITE_PATH
              value: "/donetick-data/donetick.db"
            - name: TZ
              value: "Europe/Berlin"
          envFrom:
            - secretRef:
                name: donetick-secret
          volumeMounts:
            - name: data
              mountPath: /donetick-data
            - name: config
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: donetick-pvc
        - name: config
          secret:
            secretName: donetick-config-secret
            items:
              - key: selfhosted.yaml
                path: selfhosted.yaml
