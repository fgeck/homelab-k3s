---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: couchdb-secret
  namespace: default
type: Opaque
stringData:
  COUCHDB_USER: ${quote}${COUCHDB_USER}${quote}
  COUCHDB_PASSWORD: ${quote}${COUCHDB_PASSWORD}${quote}
