---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: karakeep-secrets
  namespace: default
type: Opaque
stringData:
  NEXTAUTH_SECRET: ${quote}${KARAKEEP_NEXTAUTH_SECRET}${quote}
  MEILI_MASTER_KEY: ${quote}${KARAKEEP_MEILI_MASTER_KEY}${quote}
  NEXT_PUBLIC_SECRET: ${quote}${KARAKEEP_NEXT_PUBLIC_SECRET}${quote}
  # OPENAI_API_KEY: ${quote}${KARAKEEP_OPENAI_APIKEY}${quote}
  NEXTAUTH_URL: ${quote}https://bookmarks.${DOMAIN_NAME}${quote}
  DISABLE_SIGNUPS: "true"
  EMAIL_VERIFICATION_REQUIRED: "true"
  # SMTP Configuration (using Resend)
  SMTP_HOST: ${RESEND_SMTP_HOST}
  SMTP_PORT: ${quote}${RESEND_SMTP_PORT}${quote}
  SMTP_SECURE: "true"
  SMTP_USER: ${RESEND_SMTP_USER}
  SMTP_PASSWORD: ${quote}${RESEND_API_KEY}${quote}
  SMTP_FROM: ${quote}karakeep@${DOMAIN_NAME}${quote}
  # OAuth Configuration (PocketID)
  OAUTH_WELLKNOWN_URL: ${quote}https://id.${DOMAIN_NAME}/.well-known/openid-configuration${quote}
  OAUTH_CLIENT_ID: ${quote}${KARAKEEP_POCKETID_CLIENT_ID}${quote}
  OAUTH_CLIENT_SECRET: ${quote}${KARAKEEP_POCKETID_CLIENT_SECRET}${quote}
  OAUTH_PROVIDER_NAME: "PocketID"
  OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: "true"
