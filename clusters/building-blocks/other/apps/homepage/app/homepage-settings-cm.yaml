---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-settings
  namespace: default
data:
  docker.yaml: ""
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: "HomeLab K3s @ Merowinger"
    useEqualHeights: true
    providers:
      openweathermap: openweathermapapikey
      weatherapi: weatherapiapikey
    background:
      image: /images/code.jpg
      blur: sm # sm, "", md, xl... see https://tailwindcss.com/docs/backdrop-blur
      saturate: 50 # 0, 50, 100... see https://tailwindcss.com/docs/backdrop-saturate
      brightness: 50 # 0, 50, 75... see https://tailwindcss.com/docs/backdrop-brightness
      opacity: 10 # 0-100
    layout:
      Calendar:
        style: row
        columns: 1
      Network:
        style: row
        columns: 2
      Infrastructure:
        style: row
        columns: 2
      Home:
        style: row
        columns: 3
      Apps:
        style: row
        columns: 3
      Media:
        style: row
        columns: 2
      Downloads:
        style: row
        columns: 3
  bookmarks.yaml: |
    - Development:
        - Github:
          - abbr: GH
            href: https://github.com/fgeck
    - Social:
        - Whatsapp:
            - abbr: WA
              href: https://web.whatsapp.com/
        - Telegram:
            - abbr: T
              href: https://web.telegram.org/
    - Entertainment:
        - YouTube:
            - abbr: YT
              href: https://youtube.com/
        - Pr0gramm:
            - abbr: Pr0
              href: https://pr0gramm.com/
  widgets.yaml: |
    - resources:
        # change backend to 'kubernetes' to use Kubernetes integration. Requires RBAC.
        backend: kubernetes
        cpu: true
        memory: true
        # disk: /mnt/data
    - search:
        provider: duckduckgo
        target: _blank
    - openweathermap:
        label: Neustadt
        latitude: 49.35009
        longitude: 8.13886
        units: metric # or imperial
        provider: openweathermap
        apiKey: '{{HOMEPAGE_VAR_OPENWEATHERMAP_KEY}}'
        cache: 5 # Time in minutes to cache API responses, to stay within limits
        format: # optional, Intl.NumberFormat options
          maximumFractionDigits: 1
    - datetime:
        text_size: xl
        format:
          timeStyle: short
    ## Uncomment to enable Kubernetes integration
    - kubernetes:
        cluster:
          show: false
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: false
          cpu: true
          memory: true
          showLabel: true
  services.yaml: |-
    - Calendar:
        - Calendar:
            widget:
              type: calendar
              view: agenda # optional - possible values monthly, agenda
              maxEvents: 10 # optional - defaults to 10
              integrations:
                  - type: ical # Show calendar events from another service
                    url: '{{HOMEPAGE_VAR_FLORIAN_CALENDAR}}'
                    name: Florian # required - name for these calendar events
                    color: zinc # optional - defaults to pre-defined color for the service (zinc for ical)
                    params: # optional - additional params for the service
                      showName: true # optional - show name before event title in event line - defaults to false
    - Network:
        - FritzBox:
            href:  http://192.168.178.1
            icon: avm-fritzbox.png
            siteMonitor:  http://192.168.178.1
            widget:
              type: fritzbox
              url: http://192.168.178.1
        - PiHole:
            href:  http://192.168.178.111/admin
            icon: pi-hole.png
            proxmoxNode: pve
            proxmoxVMID: 111
            proxmoxType: lxc
            siteMonitor: http://192.168.178.111
            widget:
              type: pihole
              url: http://192.168.178.111
              key: '{{HOMEPAGE_VAR_PIHOLE_KEY}}'
        - Traefik:
            href:  https://traefik.home.geckeler.dev/dashboard/
            icon: traefik.svg
            siteMonitor: https://traefik.home.geckeler.dev/dashboard/
            widget:
              type: traefik
              url: https://traefik.home.geckeler.dev
              username: traefik
              password: '{{HOMEPAGE_VAR_TRAEFIK_DASHBOARD_PASSWORD}}'
        - CrowdSec:
            icon: crowdsec.png
            href: http://crowdsec-lapi.security.svc.cluster.local:8080
            siteMonitor: http://crowdsec-lapi.security.svc.cluster.local:8080/health
            widget:
              type: crowdsec
              url: http://crowdsec-lapi.security.svc.cluster.local:8080
              username: '{{HOMEPAGE_VAR_CROWDSEC_USERNAME}}'
              password: '{{HOMEPAGE_VAR_CROWDSEC_PASSWORD}}'
              limit24h: true
    - Infrastructure:
        - Proxmox:
            href: https://192.168.178.10:8006
            icon: proxmox.png
            siteMonitor: https://192.168.178.10:8006
            widget:
              type: proxmox
              url: https://192.168.178.10:8006
              username: '{{HOMEPAGE_VAR_PROXMOX_USERNAME}}'
              password: '{{HOMEPAGE_VAR_PROXMOX_PASSWORD}}'
        - Flux:
            href: https://flux.home.geckeler.dev
            icon: flux-cd.png
            siteMonitor: https://flux.home.geckeler.dev
        - Pocket ID:
            href: https://id.geckeler.dev
            icon: pocket-id.png
            siteMonitor: http://pocket-id.security.svc.cluster.local:1411
        - Gatus:
            href: https://status.home.geckeler.dev
            icon: gatus.png
            siteMonitor: http://gatus.monitoring.svc.cluster.local:8080/health
            widget:
              type: gatus
              url: http://gatus.monitoring.svc.cluster.local:8080
    - Home:
        - HomeAssistant:
            href: https://ha.geckeler.dev
            icon: home-assistant.png
            proxmoxNode: pve
            proxmoxVMID: 200
            siteMonitor: http://192.168.178.150:8123/
            widget:
              type: homeassistant
              url: http://192.168.178.150:8123
              key: '{{HOMEPAGE_VAR_HOMEASSISTANT_KEY}}'
              custom:
                - template: "{{ ['person.carolin', 'person.florian'] | select('is_state','home') | map('state_attr', 'friendly_name') | join(', ') }}"
                  label: At home
                - template: "{{ ['switch.espressomaschine', 'switch.subwoofer', 'switch.shelly_lueftung_switch_0', 'switch.proxmox'] | select('is_state', 'on') | map('state_attr', 'friendly_name') | join(', ') }}"
                  label: Switches On
                - template: "{{ ['light.schlafzimmer_ecke', 'light.kuche', 'light.esszimmer', ] | select('is_state', 'on') | map('state_attr', 'friendly_name') | join(', ') }}"
                  label: Lights On
                - state: sensor.electricity_consumption_this_month
                  label: Energy consumed this month
        - Creality K1C:
            href: https://print.home.geckeler.dev/
            siteMonitor: http://192.168.178.190:4409/
            icon: mainsail.png
            widget:
              type: moonraker
              url: http://192.168.178.190:7125
              fields:
                - printer_state
                - print_status
                - print_progress
        - Spoolman:
            href: https://spools.home.geckeler.dev
            icon: spoolman.png
            siteMonitor: http://spoolman.default.svc.cluster.local:80
            widget:
              type: spoolman
              url: http://spoolman.default.svc.cluster.local:80
    - Apps:
        - Karakeep:
            href: https://bookmarks.geckeler.dev
            icon: karakeep.png
            siteMonitor: http://karakeep.default.svc.cluster.local:80
            widget:
              type: karakeep
              url: http://karakeep.default.svc.cluster.local:80
              key: '{{HOMEPAGE_VAR_KARAKEEP_KEY}}'
              fields:
                - bookmarks
                - lists
                - tags
        - Paperless:
            href: https://docs.geckeler.dev
            icon: paperless.png
            siteMonitor: https://docs.geckeler.dev
            widget:
              type: paperlessngx
              url: https://docs.geckeler.dev
              key: '{{HOMEPAGE_VAR_PAPERLESS_KEY}}'
        - Vaultwarden:
            href: https://vw.geckeler.dev
            icon: vaultwarden.png
            siteMonitor: http://vaultwarden.security.svc.cluster.local:80
        - Donetick:
            href: https://todo.geckeler.dev
            icon: donetick.png
            siteMonitor: http://donetick.default.svc.cluster.local:2021
        - Better Bahn:
            href: https://bahn.home.geckeler.dev
            icon: mdi-Train
            siteMonitor: http://better-bahn.default.svc.cluster.local:3000
        - Obsidian Sync:
            href: https://obsidian.geckeler.dev
            icon: obsidian.png
            siteMonitor: https://obsidian.geckeler.dev
    - Media:
        - Immich:
            href: https://photos.geckeler.dev/
            icon: immich.png
            siteMonitor: http://immich.media.svc.cluster.local:2283/api/server/ping
            widget:
              type: immich
              url: http://immich.media.svc.cluster.local:2283
              key: '{{HOMEPAGE_VAR_IMMICH_KEY}}'
              version: 2
        - Jellyfin:
            href: https://watch.home.geckeler.dev
            icon: jellyfin.png
            siteMonitor: http://jellyfin.media.svc.cluster.local:8096/health
            widget:
              type: jellyfin
              url: https://watch.home.geckeler.dev
              key: '{{HOMEPAGE_VAR_JELLYFIN_KEY}}'
              enableBlocks: true # optional, defaults to false
              fields:
                - movies
                - series
                - episodes
        - Jellyseer:
            href: https://browse.home.geckeler.dev
            icon: jellyseerr.png
            siteMonitor: https://browse.home.geckeler.dev
            widget:
              type: jellyseerr
              url: https://browse.home.geckeler.dev
              key: '{{HOMEPAGE_VAR_SEERR_KEY}}'
        - Calibre-Web-Automated:
            href: https://books.geckeler.dev
            icon: calibre-web.png
            siteMonitor: https://books.geckeler.dev
            widget:
              type: calibreweb
              url: https://books.geckeler.dev
              username: '{{HOMEPAGE_VAR_CALIBRE_WEB_USER}}'
              password: '{{HOMEPAGE_VAR_CALIBRE_WEB_PASSWORD}}'
              fields:
                  - books
    - Downloads:
        - Radarr:
            href: https://radarr.home.geckeler.dev
            icon: radarr.png
            siteMonitor: https://radarr.home.geckeler.dev
            widget:
              type: radarr
              url: https://radarr.home.geckeler.dev
              key: '{{HOMEPAGE_VAR_RADARR_KEY}}'
              enableQueue: true # optional, defaults to false
        - Sonarr:
            href: https://sonarr.home.geckeler.dev
            icon: sonarr.png
            siteMonitor: https://sonarr.home.geckeler.dev
            widget:
              type: sonarr
              url: https://sonarr.home.geckeler.dev
              key: '{{HOMEPAGE_VAR_SONARR_KEY}}'
              enableQueue: true # optional, defaults to false
        - Sabnzbd:
            href: https://dl.home.geckeler.dev
            icon: sabnzbd.png
            siteMonitor: https://dl.home.geckeler.dev
            widget:
              type: sabnzbd
              url: https://dl.home.geckeler.dev
              key: '{{HOMEPAGE_VAR_SABNZBD_KEY}}'
