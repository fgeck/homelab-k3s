# Initial setup: kubectl port-forward -n security svc/tinyauth 3000:80
# Then access http://localhost:3000 to verify
# After Pocket ID is configured, uncomment the route below
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tinyauth
  namespace: security
  labels:
    app: tinyauth
spec:
  entryPoints:
    - websecure
    - web
  routes: []
