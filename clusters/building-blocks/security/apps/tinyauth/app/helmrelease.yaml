---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tinyauth
spec:
  releaseName: tinyauth
  interval: 30m
  chart:
    spec:
      chart: tinyauth
      version: "2.0.5"
      sourceRef:
        kind: HelmRepository
        name: tinyauth
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: tinyauth-helm-values
    - kind: Secret
      name: tinyauth-secret
      valuesKey: values.yaml
