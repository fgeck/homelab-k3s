---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamic-home-cert
  namespace: edge
data:
  dynamic-home-cert.yaml: |-
    tls:
      certificates:
        - certFile: "/certs/tls.crt"
          keyFile: "/certs/tls.key"
