---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: network
spec:
  interval: 30m
  chart:
    spec:
      chart: gateway-helm
      version: "v1.7.2"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deployment:
      replicas: 1
    config:
      envoyGateway:
        extensionApis:
          enableBackend: true
