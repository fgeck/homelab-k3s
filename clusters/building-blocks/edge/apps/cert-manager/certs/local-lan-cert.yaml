---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: lan-ca-secret
  namespace: edge
type: kubernetes.io/tls
data:
  tls.crt: ${quote}${LAN_CA_CRT_BASE64}${quote}
  tls.key: ${quote}${LAN_CA_KEY_BASE64}${quote}
