---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-dns-credentials
  namespace: edge
type: Opaque
stringData:
  apiToken: "${CLOUDFLARE_API_TOKEN}"
  userEmail: "${ACME_EMAIL}"
  zonesToUpdate: "${CLOUDFLARE_ZONES_TO_UPDATE}"
