---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-hcloud-backup
  namespace: media
  labels:
    app.kubernetes.io/name: immich-hcloud-backup
    app.kubernetes.io/component: backup
spec:
  schedule: "0 3 * * 1" # Every Monday day at 3 AM
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 36000 # 10 hour timeout
      ttlSecondsAfterFinished: 172800 # 48 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: immich-hcloud-backup
            app.kubernetes.io/component: backup
        spec:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: gorestic
              image: ghcr.io/fgeck/gorestic-homelab:latest
              imagePullPolicy: Always
              args:
                - "run"
                - "--config"
                - "/config/config.yaml"
                - "--verbose"
              envFrom:
                - secretRef:
                    name: immich-hcloud-backup-secret
              env:
                - name: POSTGRES_HOST
                  value: "${DEFAULT_POSTGRES_HOST}"
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-vecto-immich-auth
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-vecto-immich-auth
                      key: password
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: photos
                  mountPath: /data/photos
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
          volumes:
            - name: config
              configMap:
                name: immich-hcloud-backup-config
            - name: photos
              hostPath:
                path: /mnt/data/photos
                type: Directory
            - name: tmp
              emptyDir:
                sizeLimit: 5Gi
