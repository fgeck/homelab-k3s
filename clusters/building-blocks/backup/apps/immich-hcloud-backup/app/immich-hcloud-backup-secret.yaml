---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: immich-hcloud-backup-secret
  namespace: media
type: Opaque
stringData:
  H_CLOUD_HOST: ${quote}${IMMICH_HCLOUD_BACKUP_HOST}${quote}
  RESTIC_PASSWORD: ${quote}${IMMICH_HCLOUD_BACKUP_RESTIC_PASSWORD}${quote}
  RESTIC_REST_USERNAME: ${quote}${IMMICH_HCLOUD_BACKUP_RESTIC_REST_USER}${quote}
  RESTIC_REST_PASSWORD: ${quote}${IMMICH_HCLOUD_BACKUP_RESTIC_REST_PASSWORD}${quote}
  PUSHOVER_BACKUPS_TOKEN: ${quote}${PUSHOVER_BACKUPS_TOKEN}${quote}
  PUSHOVER_USER_KEY: ${quote}${PUSHOVER_USER_KEY}${quote}
