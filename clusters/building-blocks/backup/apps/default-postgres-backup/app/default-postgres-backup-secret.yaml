---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: default-postgres-backup-secret
  namespace: default
type: Opaque
stringData:
  POSTGRES_HOST: ${DEFAULT_POSTGRES_HOST}
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: ${quote}${DEFAULT_POSTGRES_SYSTEM_PASSWORD}${quote}
  PROXMOX_BACKUP_SERVER_PASSWORD: ${quote}${PROXMOX_BACKUP_SERVER_PASSWORD}${quote}
  PROXMOX_BACKUP_SERVER_REPOSITORY: ${quote}${PROXMOX_BACKUP_SERVER_REPOSITORY}${quote}
  PROXMOX_BACKUP_SERVER_FINGERPRINT: ${quote}${PROXMOX_BACKUP_SERVER_FINGERPRINT}${quote}
  TELEGRAM_BOT_TOKEN: ${quote}${TELEGRAM_BOT_TOKEN}${quote}
  TELEGRAM_CHAT_ID: ${quote}${TELEGRAM_BOT_CHAT_ID}${quote}
