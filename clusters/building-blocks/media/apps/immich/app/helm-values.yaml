---
# Immich Helm Values
controllers:
  main:
    pod:
      securityContext:
        fsGroup: 3004
        fsGroupChangePolicy: OnRootMismatch
    containers:
      main:
        image:
          tag: v2.7.5
        ports:
          - name: http
            containerPort: 2283
            protocol: TCP
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        env:
          # Database credentials from postgresql-vecto-immich-auth (single source of truth)
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: postgresql-vecto-immich-auth
                key: username
                optional: false
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgresql-vecto-immich-auth
                key: password
                optional: false
        envFrom:
          # Redis and PostgreSQL connection config
          - secretRef:
              name: immich-secret

# Immich configuration
immich:
  persistence:
    library:
      existingClaim: pvc-nfs-photos

# Disable Valkey - using existing Redis instead
valkey:
  enabled: false

# Enable machine learning with persistent cache
# Override ports to use 3003 (chart 0.10.3 defaults to 2283 incorrectly)
machine-learning:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            tag: v2.5.6
          ports:
            - name: http
              containerPort: 3003
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          probes:
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: http
                failureThreshold: 90
                periodSeconds: 10
                timeoutSeconds: 5
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: http
                periodSeconds: 30
                timeoutSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: http
                periodSeconds: 10
                timeoutSeconds: 5
  service:
    main:
      ports:
        http:
          port: 3003
  persistence:
    cache:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: immich-ml-cache-pvc

# Server/web interface configuration
server:
  enabled: true

# Service configuration for main server
service:
  main:
    controller: main
    ports:
      http:
        port: 2283
