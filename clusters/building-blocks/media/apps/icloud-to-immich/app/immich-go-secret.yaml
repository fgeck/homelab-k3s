---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: immich-go-secret
  namespace: media
  labels:
    app.kubernetes.io/name: icloud-to-immich
    app.kubernetes.io/component: uploader
type: Opaque
stringData:
  # Immich API credentials
  IMMICH_SERVER_URL: ${quote}${IMMICH_SERVER_URL}${quote}
  IMMICH_API_KEY: ${quote}${IMMICH_API_KEY}${quote}
  # Pushover notifications
  PUSHOVER_ALERTS_TOKEN: ${quote}${PUSHOVER_ALERTS_TOKEN}${quote}
  PUSHOVER_USER_KEY: ${quote}${PUSHOVER_USER_KEY}${quote}
