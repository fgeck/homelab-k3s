---
apiVersion: v1
kind: Secret
metadata:
  name: icloudpd-secret
  namespace: media
  labels:
    app.kubernetes.io/name: icloud-to-immich
    app.kubernetes.io/component: downloader
type: Opaque
stringData:
  # iCloud credentials
  APPLE_ID: ${quote}${APPLE_ID}${quote}
  ICLOUD_PASSWORD: ${quote}${ICLOUD_PASSWORD}${quote}
  # SMTP settings for 2FA expiry notification (Resend)
  SMTP_USERNAME: ${RESEND_SMTP_USER}
  SMTP_PASSWORD: ${quote}${RESEND_API_KEY}${quote}
  SMTP_HOST: ${RESEND_SMTP_HOST}
  SMTP_PORT: ${quote}${RESEND_SMTP_PORT}${quote}
  NOTIFICATION_EMAIL: ${quote}${NOTIFICATION_EMAIL}${quote}
  NOTIFICATION_EMAIL_FROM: "homelab@${DOMAIN_NAME}"
  # Telegram notifications
  TELEGRAM_BOT_TOKEN: ${quote}${TELEGRAM_BOT_TOKEN}${quote}
  TELEGRAM_CHAT_ID: ${quote}${TELEGRAM_BOT_CHAT_ID}${quote}
