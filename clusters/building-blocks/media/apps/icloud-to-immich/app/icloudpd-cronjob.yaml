---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: icloudpd-download
  namespace: media
  labels:
    app.kubernetes.io/name: icloud-to-immich
    app.kubernetes.io/component: downloader
spec:
  schedule: "0 5 * * *" # Every day at 5 AM
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200 # 2 hour timeout
      ttlSecondsAfterFinished: 86400 # 24 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: icloud-to-immich
            app.kubernetes.io/component: downloader
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: icloudpd
              image: icloudpd/icloudpd:latest
              command:
                - "/bin/sh"
                - "-c"
              args:
                - |
                  send_notification() {
                    if [ -n "$PUSHOVER_ALERTS_TOKEN" ] && [ -n "$PUSHOVER_USER_KEY" ]; then
                      curl -s -X POST "https://api.pushover.net/1/messages.json" \
                        -F "token=${PUSHOVER_ALERTS_TOKEN}" \
                        -F "user=${PUSHOVER_USER_KEY}" \
                        -F "priority=1" \
                        -F "title=icloudpd-download failed" \
                        -F "message=Host: $(hostname)%0ATime: $(date)%0AError: $1" > /dev/null || true
                    fi
                  }

                  /app/icloudpd \
                    --username "$APPLE_ID" \
                    --password "$ICLOUD_PASSWORD" \
                    --directory /data \
                    --cookie-directory /config \
                    --folder-structure "{:%Y/%m/%d}" \
                    --until-found 10 \
                    --set-exif-datetime \
                    --no-progress-bar \
                    --smtp-username "$SMTP_USERNAME" \
                    --smtp-password "$SMTP_PASSWORD" \
                    --smtp-host "$SMTP_HOST" \
                    --smtp-port "$SMTP_PORT" \
                    --notification-email "$NOTIFICATION_EMAIL" \
                    --notification-email-from "$NOTIFICATION_EMAIL_FROM"

                  EXIT_CODE=$?
                  if [ $EXIT_CODE -ne 0 ]; then
                    send_notification "Exit code $EXIT_CODE"
                    exit $EXIT_CODE
                  fi
              env:
                - name: TZ
                  value: "Europe/Berlin"
              envFrom:
                - secretRef:
                    name: icloudpd-secret
              volumeMounts:
                - name: icloudpd-config
                  mountPath: /config
                - name: icloud-staging
                  mountPath: /data
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: icloudpd-config
              persistentVolumeClaim:
                claimName: icloudpd-config-pvc
            - name: icloud-staging
              hostPath:
                path: /mnt/data/icloud-staging
                type: DirectoryOrCreate
