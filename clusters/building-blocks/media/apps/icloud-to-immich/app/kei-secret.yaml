---
apiVersion: v1
kind: Secret
metadata:
  name: kei-secret
  namespace: media
  labels:
    app.kubernetes.io/name: icloud-to-immich
    app.kubernetes.io/component: kei-downloader
type: Opaque
stringData:
  # iCloud credentials
  ICLOUD_USERNAME: ${quote}${APPLE_ID}${quote}
  ICLOUD_PASSWORD: ${quote}${ICLOUD_PASSWORD}${quote}
  # Telegram notifications
  TELEGRAM_BOT_TOKEN: ${quote}${TELEGRAM_BOT_TOKEN}${quote}
  TELEGRAM_CHAT_ID: ${quote}${TELEGRAM_BOT_CHAT_ID}${quote}
