---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-go-upload
  namespace: media
  labels:
    app.kubernetes.io/name: icloud-to-immich
    app.kubernetes.io/component: uploader
spec:
  schedule: "0 7 * * *" # Every day at 7 AM
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 14400 # 4 hour timeout
      ttlSecondsAfterFinished: 86400 # 24 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: icloud-to-immich
            app.kubernetes.io/component: uploader
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 0  # Need root to install binary
            runAsGroup: 0
            fsGroup: 1000
          containers:
            - name: immich-go
              image: alpine:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  # Download immich-go binary
                  apk add --no-cache curl tar
                  LATEST=$(curl -s https://api.github.com/repos/simulot/immich-go/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
                  echo "Downloading immich-go $LATEST..."
                  curl -sL "https://github.com/simulot/immich-go/releases/download/${LATEST}/immich-go_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin/
                  chmod +x /usr/local/bin/immich-go
                  
                  # Run immich-go upload
                  immich-go upload from-icloud \
                    --server="$IMMICH_SERVER_URL" \
                    --api-key="$IMMICH_API_KEY" \
                    --folder-as-album=PATH \
                    --manage-heic-jpeg=StackCoverJPG \
                    --manage-raw-jpeg=StackCoverRaw \
                    --manage-burst=Stack \
                    --session-tag \
                    --tag=Source/iCloud \
                    --concurrent-tasks=4 \
                    --pause-immich-jobs=true \
                    --on-errors=continue \
                    --client-timeout=60m \
                    --no-ui \
                    /data
                  
                  # Cleanup files older than 48h (keep recent for icloudpd --until-found)
                  echo "Cleaning up files older than 48 hours..."
                  find /data -type f -mtime +2 -delete
                  find /data -type d -empty -delete 2>/dev/null || true
                  echo "Cleanup complete"
              env:
                - name: TZ
                  value: "Europe/Berlin"
              envFrom:
                - secretRef:
                    name: immich-go-secret
              volumeMounts:
                - name: icloud-staging
                  mountPath: /data
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: icloud-staging
              hostPath:
                path: /mnt/data/icloud-staging
                type: DirectoryOrCreate
