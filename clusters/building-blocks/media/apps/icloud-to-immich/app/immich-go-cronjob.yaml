---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-go-upload
  namespace: media
  labels:
    app.kubernetes.io/name: icloud-to-immich
    app.kubernetes.io/component: uploader
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  schedule: "0 7 * * *" # Every day at 7 AM
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 14400 # 4 hour timeout
      ttlSecondsAfterFinished: 86400 # 24 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: icloud-to-immich
            app.kubernetes.io/component: uploader
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          initContainers:
            - name: download-immich-go
              image: alpine:latest
              command:
                - "/bin/sh"
                - "-c"
              args:
                - |
                  set -e
                  apk add --no-cache curl tar
                  LATEST=$(curl -s https://api.github.com/repos/simulot/immich-go/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
                  echo "Downloading immich-go $LATEST..."
                  curl -sL "https://github.com/simulot/immich-go/releases/download/${LATEST}/immich-go_Linux_x86_64.tar.gz" | tar xz -C /opt/bin/
                  chmod +x /opt/bin/immich-go
                  echo "Download complete"
              securityContext:
                runAsUser: 0
              volumeMounts:
                - name: bin
                  mountPath: /opt/bin
          containers:
            - name: immich-go
              image: alpine:latest
              command:
                - "/bin/sh"
                - "-c"
              args:
                - |
                  send_telegram() {
                    if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
                      MESSAGE="❌ *immich-go-upload failed*%0A%0AHost: $(hostname)%0ATime: $(date)%0AError: $1"
                      wget -q -O /dev/null "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&parse_mode=Markdown&text=${MESSAGE}"
                    fi
                  }

                  # Run immich-go upload
                  /opt/bin/immich-go upload from-icloud \
                    --server="$IMMICH_SERVER_URL" \
                    --api-key="$IMMICH_API_KEY" \
                    --manage-heic-jpeg=StackCoverJPG \
                    --manage-raw-jpeg=StackCoverRaw \
                    --manage-burst=Stack \
                    --session-tag \
                    --tag=Source/iCloud \
                    --concurrent-tasks=4 \
                    --pause-immich-jobs=true \
                    --on-errors=continue \
                    --client-timeout=60m \
                    --no-ui \
                    /data

                  EXIT_CODE=$?
                  if [ $EXIT_CODE -ne 0 ]; then
                    send_telegram "Exit code $EXIT_CODE"
                    exit $EXIT_CODE
                  fi

                  # Cleanup files older than 48h (keep recent for icloudpd --until-found)
                  echo "Cleaning up files older than 48 hours..."
                  find /data -type f -mtime +2 -delete
                  find /data -type d -empty -delete 2>/dev/null || true
                  echo "Cleanup complete"
              env:
                - name: TZ
                  value: "Europe/Berlin"
                - name: HOME
                  value: "/tmp"
              envFrom:
                - secretRef:
                    name: immich-go-secret
              volumeMounts:
                - name: icloud-staging
                  mountPath: /data
                - name: bin
                  mountPath: /opt/bin
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: icloud-staging
              hostPath:
                path: /mnt/data/icloud-staging
                type: DirectoryOrCreate
            - name: bin
              emptyDir: {}
