---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-go-upload
  namespace: media
  labels:
    app.kubernetes.io/name: icloud-to-immich
    app.kubernetes.io/component: uploader
spec:
  schedule: "0 23 * * *" # Every day at 11 PM (1 hour after download)
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 14400 # 4 hour timeout
      ttlSecondsAfterFinished: 86400 # 24 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: icloud-to-immich
            app.kubernetes.io/component: uploader
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: immich-go
              image: ghcr.io/simulot/immich-go:latest
              args:
                - upload
                - from-icloud
                - --server=$(IMMICH_SERVER_URL)
                - --api-key=$(IMMICH_API_KEY)
                # iCloud-specific options
                - --folder-as-album=PATH
                - --manage-heic-jpeg=StackCoverJPG
                - --manage-raw-jpeg=StackCoverRaw
                - --manage-burst=Stack
                # Tagging
                - --session-tag
                - --tag=Source/iCloud
                # Delete after successful upload
                - --delete
                # Performance
                - --concurrent-tasks=4
                - --pause-immich-jobs=true
                - --on-errors=continue
                - --client-timeout=60m
                # No progress bar for logs
                - --no-ui
                # Source directory
                - /data
              env:
                - name: TZ
                  value: "Europe/Berlin"
              envFrom:
                - secretRef:
                    name: immich-go-secret
              volumeMounts:
                - name: icloud-staging
                  mountPath: /data
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: icloud-staging
              hostPath:
                path: /mnt/data/icloud-staging
                type: DirectoryOrCreate
