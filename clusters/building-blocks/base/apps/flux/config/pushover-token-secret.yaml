---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: pushover-token
  namespace: flux-system
stringData:
  token: ${quote}${PUSHOVER_ALERTS_TOKEN}${quote}
  user: ${quote}${PUSHOVER_USER_KEY}${quote}
